{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Cookie</h1>

    <div class="card mb-4">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0">Cookie</h5>
        </div>
        <div class="card-body">
            {% if cookies %}
            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>Cookie</th>
                    <th>Значение</th>
                </tr>
                </thead>
                <tbody>
                {% for key, value in cookies.items() %}
                <tr>
                    <td><code>{{ key }}</code></td>
                    <td>{{ value }}</td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p class="text-muted">Cookie отсутствуют.</p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
