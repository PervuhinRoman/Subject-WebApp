{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card">
                <div class="card-body">
                    <h1 class="display-4 text-primary mb-4">🧮 Счётчик посещений</h1>
                    <div class="display-1 mb-4">{{ visits }}</div>
                    <p class="lead text-muted">
                        Вы посетили эту страницу {{ visits }} раз(а)
                    </p>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-primary btn-lg">
                        ← На главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
